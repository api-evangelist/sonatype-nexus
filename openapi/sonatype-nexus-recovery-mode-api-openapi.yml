openapi: 3.0.1
info:
  contact:
    name: Sonatype Community Maintainers
    url: https://github.com/sonatype-nexus-community
  description: This documents the available APIs into [Sonatype Nexus Repository Manager](https://www.sonatype.com/products/sonatype-nexus-repository) as of version 3.91.0-07.
  license:
    name: Apache-2.0
    url: http://www.apache.org/licenses/LICENSE-2.0.html
  title: Sonatype Nexus Repository Manager assets Recovery Mode API
  version: 3.91.0-07
servers:
- url: /service/rest/
security:
- BasicAuth: []
tags:
- name: Recovery Mode
paths:
  /v1/recovery-mode:
    delete:
      operationId: disableRecoveryMode
      responses:
        '204':
          content: {}
          description: Recovery mode disabled
        '400':
          content: {}
          description: Cannot disable recovery mode while reconciliation tasks are running
        '401':
          content: {}
          description: Authentication required
        '403':
          content: {}
          description: Insufficient permissions
      summary: Disables recovery mode
      tags:
      - Recovery Mode
    post:
      operationId: enableRecoveryMode
      responses:
        '204':
          content: {}
          description: Recovery mode enabled
        '401':
          content: {}
          description: Authentication required
        '403':
          content: {}
          description: Insufficient permissions
      summary: Enables recovery mode and cancels conflicting tasks if running
      tags:
      - Recovery Mode
components:
  securitySchemes:
    BasicAuth:
      scheme: basic
      type: http
x-original-swagger-version: '2.0'
