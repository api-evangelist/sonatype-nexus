openapi: 3.0.1
info:
  contact:
    name: Sonatype Community Maintainers
    url: https://github.com/sonatype-nexus-community
  description: This documents the available APIs into [Sonatype Nexus Repository Manager](https://www.sonatype.com/products/sonatype-nexus-repository) as of version 3.91.0-07.
  license:
    name: Apache-2.0
    url: http://www.apache.org/licenses/LICENSE-2.0.html
  title: Sonatype Nexus Repository Manager assets Product licensing API
  version: 3.91.0-07
servers:
- url: /service/rest/
security:
- BasicAuth: []
tags:
- name: Product licensing
paths:
  /v1/system/license:
    delete:
      operationId: removeLicense
      responses:
        default:
          content: {}
          description: successful operation
      summary: Uninstall license if present.
      tags:
      - Product licensing
    get:
      operationId: getLicenseStatus
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiLicenseDetailsXO'
          description: successful operation
      summary: Get the current license status.
      tags:
      - Product licensing
    post:
      description: Server must be restarted to take effect
      operationId: setLicense
      requestBody:
        content:
          application/octet-stream:
            schema:
              $ref: '#/components/schemas/InputStream'
        required: false
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiLicenseDetailsXO'
          description: successful operation
      summary: Upload a new license file.
      tags:
      - Product licensing
      x-codegen-request-body-name: body
components:
  schemas:
    InputStream:
      format: binary
      type: string
    ApiLicenseDetailsXO:
      properties:
        contactCompany:
          type: string
        contactEmail:
          type: string
        contactName:
          type: string
        effectiveDate:
          format: date-time
          type: string
        expirationDate:
          format: date-time
          type: string
        features:
          type: string
        fingerprint:
          type: string
        licenseType:
          type: string
        licensedUsers:
          type: string
        maxRepoComponents:
          format: int64
          type: integer
        maxRepoRequests:
          format: int64
          type: integer
      type: object
  securitySchemes:
    BasicAuth:
      scheme: basic
      type: http
x-original-swagger-version: '2.0'
