components:
  schemas:
    DockerGroupRepositoryApiRequest:
      properties:
        docker:
          $ref: '#/components/schemas/DockerAttributes'
        group:
          $ref: '#/components/schemas/GroupDeployAttributes'
        name:
          description: A unique identifier for this repository (must be lowercase for Docker repositories)
          example: internal
          pattern: ^[a-zA-Z0-9\-]{1}[a-zA-Z0-9_\-\.]*$
          type: string
        online:
          description: Whether this repository accepts incoming requests
          example: true
          type: boolean
        storage:
          $ref: '#/components/schemas/StorageAttributes'
      required:
      - docker
      - group
      - name
      - online
      - storage
      type: object
    PypiProxyRepositoryApiRequest:
      properties:
        cleanup:
          $ref: '#/components/schemas/CleanupPolicyAttributes'
        httpClient:
          $ref: '#/components/schemas/HttpClientAttributes'
        name:
          description: A unique identifier for this repository
          example: internal
          pattern: ^[a-zA-Z0-9\-]{1}[a-zA-Z0-9_\-\.]*$
          type: string
        negativeCache:
          $ref: '#/components/schemas/NegativeCacheAttributes'
        online:
          description: Whether this repository accepts incoming requests
          example: true
          type: boolean
        proxy:
          $ref: '#/components/schemas/ProxyAttributes'
        pypi:
          $ref: '#/components/schemas/PyPiProxyAttributes'
        replication:
          $ref: '#/components/schemas/ReplicationAttributes'
        routingRule:
          type: string
        storage:
          $ref: '#/components/schemas/StorageAttributes'
      required:
      - httpClient
      - name
      - negativeCache
      - online
      - proxy
      - storage
      type: object
    ProxyAttributes:
      properties:
        contentMaxAge:
          description: How long to cache artifacts before rechecking the remote repository (in minutes)
          example: 1440
          format: int32
          type: integer
        metadataMaxAge:
          description: How long to cache metadata before rechecking the remote repository (in minutes)
          example: 1440
          format: int32
          type: integer
        preserveEncodedCharacters:
          description: 'When true, preserves encoded characters like %2B (plus), %23 (hash), and %20 (space) in their encoded form when proxying to the remote repository. Enable this when proxying to AWS S3, Cloudflare CDN, or Azure Blob Storage, which require encoded characters to remain encoded. When false (default), uses standard encoding that preserves literal + characters (works for crates.io and most remotes). This feature is only available when nexus.proxy.urlEncodingMode.enabled=true is set. SECURITY NOTE: Only enable this for trusted remote repositories. Path traversal sequences (..) in redirects are automatically normalized.'
          example: false
          type: boolean
        remoteUrl:
          description: Location of the remote repository being proxied
          example: https://remote.repository.com
          type: string
      required:
      - contentMaxAge
      - metadataMaxAge
      type: object
