openapi: 3.0.1
info:
  contact:
    name: Sonatype Community Maintainers
    url: https://github.com/sonatype-nexus-community
  description: This documents the available APIs into [Sonatype Nexus Repository Manager](https://www.sonatype.com/products/sonatype-nexus-repository) as of version 3.91.0-07.
  license:
    name: Apache-2.0
    url: http://www.apache.org/licenses/LICENSE-2.0.html
  title: Sonatype Nexus Repository Manager assets Lifecycle API
  version: 3.91.0-07
servers:
- url: /service/rest/
security:
- BasicAuth: []
tags:
- name: Lifecycle
paths:
  /v1/lifecycle/bounce:
    put:
      description: Re-runs all phases from the given phase to the current phase
      operationId: bounce
      requestBody:
        content:
          text/plain:
            schema:
              type: string
        description: The phase to bounce
        required: false
      responses:
        default:
          content: {}
          description: successful operation
      summary: Bounce lifecycle phase
      tags:
      - Lifecycle
      x-codegen-request-body-name: body
  /v1/lifecycle/phase:
    get:
      operationId: getPhase
      responses:
        '200':
          content:
            text/plain:
              schema:
                type: string
          description: successful operation
      summary: Get current lifecycle phase
      tags:
      - Lifecycle
    put:
      operationId: setPhase
      requestBody:
        content:
          text/plain:
            schema:
              type: string
        description: The phase to move to
        required: false
      responses:
        default:
          content: {}
          description: successful operation
      summary: Move to new lifecycle phase
      tags:
      - Lifecycle
      x-codegen-request-body-name: body
components:
  securitySchemes:
    BasicAuth:
      scheme: basic
      type: http
x-original-swagger-version: '2.0'
