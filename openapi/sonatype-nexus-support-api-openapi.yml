openapi: 3.0.1
info:
  contact:
    name: Sonatype Community Maintainers
    url: https://github.com/sonatype-nexus-community
  description: This documents the available APIs into [Sonatype Nexus Repository Manager](https://www.sonatype.com/products/sonatype-nexus-repository) as of version 3.91.0-07.
  license:
    name: Apache-2.0
    url: http://www.apache.org/licenses/LICENSE-2.0.html
  title: Sonatype Nexus Repository Manager assets Support API
  version: 3.91.0-07
servers:
- url: /service/rest/
security:
- BasicAuth: []
tags:
- name: Support
paths:
  /v1/support/supportzip:
    post:
      operationId: supportzip
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SupportZipGeneratorRequest'
        required: false
      responses:
        '200':
          content: {}
          description: successful operation
        '403':
          content: {}
          description: Insufficient permissions to generate support zip
      summary: Creates and downloads a support zip
      tags:
      - Support
      x-codegen-request-body-name: body
  /v1/support/supportzippath:
    post:
      operationId: supportzippath
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SupportZipGeneratorRequest'
        required: false
      responses:
        '200':
          content: {}
          description: successful operation
        '403':
          content: {}
          description: Insufficient permissions to generate support zip
      summary: Creates a support zip and returns the path
      tags:
      - Support
      x-codegen-request-body-name: body
components:
  schemas:
    SupportZipGeneratorRequest:
      properties:
        archivedLog:
          format: int32
          type: integer
        auditLog:
          type: boolean
        configuration:
          type: boolean
        hostname:
          type: string
        jmx:
          type: boolean
        limitFileSizes:
          type: boolean
        limitZipSize:
          type: boolean
        log:
          type: boolean
        metrics:
          type: boolean
        replication:
          type: boolean
        security:
          type: boolean
        systemInformation:
          type: boolean
        taskLog:
          type: boolean
        threadDump:
          type: boolean
      type: object
  securitySchemes:
    BasicAuth:
      scheme: basic
      type: http
x-original-swagger-version: '2.0'
