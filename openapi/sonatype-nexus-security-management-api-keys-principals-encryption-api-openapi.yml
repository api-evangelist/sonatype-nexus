openapi: 3.0.1
info:
  contact:
    name: Sonatype Community Maintainers
    url: https://github.com/sonatype-nexus-community
  description: This documents the available APIs into [Sonatype Nexus Repository Manager](https://www.sonatype.com/products/sonatype-nexus-repository) as of version 3.91.0-07.
  license:
    name: Apache-2.0
    url: http://www.apache.org/licenses/LICENSE-2.0.html
  title: 'Sonatype Nexus Repository Manager assets Security management: api keys principals encryption API'
  version: 3.91.0-07
servers:
- url: /service/rest/
security:
- BasicAuth: []
tags:
- name: 'Security management: api keys principals encryption'
paths:
  /v1/apikeys/encryption/re-encrypt:
    put:
      description: Ensure all nodes have access to the key, and they use the same key
      operationId: reEncrypt
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ApiKeysReEncryptionRequestApiXO'
        required: false
      responses:
        '202':
          content: {}
          description: Re-encrypt task successfully submitted
        '400':
          content: {}
          description: 'Invalid request. See the response for more information. Possible causes: The key is not available to all nodes, upgrade needed or empty key id.'
        '403':
          content: {}
          description: Insufficient permissions to re-encrypt secrets
        '409':
          content: {}
          description: Re-encryption task in progress.
      summary: Re-encrypt api keys principals using the specified configuration
      tags:
      - 'Security management: api keys principals encryption'
      x-codegen-request-body-name: body
components:
  schemas:
    ApiKeysReEncryptionRequestApiXO:
      properties:
        algorithmForDecryption:
          description: Optional - The algorithm to be used to decrypt the principals
          type: string
        iterationsForDecryption:
          description: Optional - The iterations to be used to decrypt the principals
          format: int32
          type: integer
        notifyEmail:
          description: Optional - Email to notify when task finishes
          type: string
      type: object
  securitySchemes:
    BasicAuth:
      scheme: basic
      type: http
x-original-swagger-version: '2.0'
