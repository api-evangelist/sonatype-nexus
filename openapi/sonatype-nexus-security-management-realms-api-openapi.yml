openapi: 3.0.1
info:
  contact:
    name: Sonatype Community Maintainers
    url: https://github.com/sonatype-nexus-community
  description: This documents the available APIs into [Sonatype Nexus Repository Manager](https://www.sonatype.com/products/sonatype-nexus-repository) as of version 3.91.0-07.
  license:
    name: Apache-2.0
    url: http://www.apache.org/licenses/LICENSE-2.0.html
  title: 'Sonatype Nexus Repository Manager assets Security management: realms API'
  version: 3.91.0-07
servers:
- url: /service/rest/
security:
- BasicAuth: []
tags:
- name: 'Security management: realms'
paths:
  /v1/security/realms/active:
    get:
      operationId: getActiveRealms
      responses:
        '200':
          content:
            application/json:
              schema:
                items:
                  type: string
                type: array
          description: successful operation
      summary: List the active realm IDs in order
      tags:
      - 'Security management: realms'
    put:
      operationId: setActiveRealms
      requestBody:
        content:
          application/json:
            schema:
              items:
                type: string
              type: array
        description: The realm IDs
        required: false
      responses:
        default:
          content: {}
          description: successful operation
      summary: Set the active security realms in the order they should be used
      tags:
      - 'Security management: realms'
      x-codegen-request-body-name: body
  /v1/security/realms/available:
    get:
      operationId: getRealms
      responses:
        '200':
          content:
            application/json:
              schema:
                items:
                  $ref: '#/components/schemas/RealmApiXO'
                type: array
          description: successful operation
      summary: List the available realms
      tags:
      - 'Security management: realms'
components:
  schemas:
    RealmApiXO:
      properties:
        id:
          type: string
        name:
          type: string
      type: object
  securitySchemes:
    BasicAuth:
      scheme: basic
      type: http
x-original-swagger-version: '2.0'
