apis:
- aid: sonatype-nexus:nexus-repository-api
  name: Nexus Repository API
  description: REST API for Sonatype Nexus Repository Manager (v3.91.0) providing 238 endpoints for managing repositories
    across many formats (Maven, npm, Docker, PyPI, NuGet, RubyGems, Go, Cargo, Helm, Terraform, R, APT, Yum, Raw, Swift, and
    more), components, assets, blob stores (file, S3, Azure, GCS), security (users, roles, privileges, LDAP, SAML, Crowd),
    search, tasks, cleanup policies, staging, and system administration. Authentication uses HTTP Basic Auth or User Tokens.
  humanURL: https://help.sonatype.com/en/api-reference.html
  baseURL: https://{nexus-host}/service/rest
  tags:
