aid: sonatype-nexus
name: Sonatype Nexus
description: Sonatype Nexus Repository Manager provides a comprehensive REST API for managing software artifacts, repositories,
  and components across the software development lifecycle. It supports popular formats including Maven, npm, Docker, PyPI,
  NuGet, RubyGems, Go, Helm, APT, Yum, Cargo, Terraform, R, Swift, and more. The API covers repository configuration, component
  and asset management, security, blob stores, search, tasks, cleanup policies, staging, and system administration.
type: Index
image: https://kinlane-productions.s3.amazonaws.com/apis-json/apis-json-logo.jpg
tags:
- Artifact Management
- DevOps
- Package Management
- Repository
- Maven
- npm
- Docker
- Software Supply Chain
