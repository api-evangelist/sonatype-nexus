naftiko: 1.0.0-alpha2
info:
  label: 'Sonatype Nexus Repository Manager — Security Management: Anonymous Access'
  description: 'Sonatype Nexus Repository Manager — Security Management: Anonymous Access. 2 operations. Lead operation: Get
    Anonymous Access settings. Self-contained Naftiko capability covering one Sonatype Nexus business surface.'
  tags:
  - Sonatype Nexus
  - 'Security Management: Anonymous Access'
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    SONATYPE_NEXUS_API_KEY: SONATYPE_NEXUS_API_KEY
capability:
  consumes:
  - type: http
    namespace: repository-security-management-anonymous-access
    baseUri: ''
    description: 'Sonatype Nexus Repository Manager — Security Management: Anonymous Access business capability. Self-contained,
      no shared references.'
    resources:
    - name: v1-security-anonymous
      path: /v1/security/anonymous
      operations:
      - name: read1
        method: GET
        description: Get Anonymous Access settings
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: update1
        method: PUT
        description: Update Anonymous Access settings
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    authentication:
      type: basic
      username: '{{env.SONATYPE_NEXUS_USER}}'
      password: '{{env.SONATYPE_NEXUS_PASS}}'
  exposes:
  - type: rest
    namespace: repository-security-management-anonymous-access-rest
    port: 8080
    description: 'REST adapter for Sonatype Nexus Repository Manager — Security Management: Anonymous Access. One Spectral-compliant
      resource per consumed operation, prefixed with /v1.'
    resources:
    - path: /v1/v1/security/anonymous
      name: v1-security-anonymous
      description: REST surface for v1-security-anonymous.
      operations:
      - method: GET
        name: read1
        description: Get Anonymous Access settings
        call: repository-security-management-anonymous-access.read1
        outputParameters:
        - type: object
          mapping: $.
      - method: PUT
        name: update1
        description: Update Anonymous Access settings
        call: repository-security-management-anonymous-access.update1
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: repository-security-management-anonymous-access-mcp
    port: 9090
    transport: http
    description: 'MCP adapter for Sonatype Nexus Repository Manager — Security Management: Anonymous Access. One tool per
      consumed operation, routed inline through this capability''s consumes block.'
    tools:
    - name: get-anonymous-access-settings
      description: Get Anonymous Access settings
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: repository-security-management-anonymous-access.read1
      outputParameters:
      - type: object
        mapping: $.
    - name: update-anonymous-access-settings
      description: Update Anonymous Access settings
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: repository-security-management-anonymous-access.update1
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
