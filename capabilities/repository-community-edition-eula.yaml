naftiko: 1.0.0-alpha2
info:
  label: Sonatype Nexus Repository Manager — Community Edition Eula
  description: 'Sonatype Nexus Repository Manager — Community Edition Eula. 2 operations. Lead operation: Get the current
    Community Eula status.. Self-contained Naftiko capability covering one Sonatype Nexus business surface.'
  tags:
  - Sonatype Nexus
  - Community Edition Eula
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    SONATYPE_NEXUS_API_KEY: SONATYPE_NEXUS_API_KEY
capability:
  consumes:
  - type: http
    namespace: repository-community-edition-eula
    baseUri: ''
    description: Sonatype Nexus Repository Manager — Community Edition Eula business capability. Self-contained, no shared
      references.
    resources:
    - name: v1-system-eula
      path: /v1/system/eula
      operations:
      - name: getcommunityeulastatus
        method: GET
        description: Get the current Community Eula status.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: seteulaacceptedce
        method: POST
        description: Set the Community Eula status.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    authentication:
      type: basic
      username: '{{env.SONATYPE_NEXUS_USER}}'
      password: '{{env.SONATYPE_NEXUS_PASS}}'
  exposes:
  - type: rest
    namespace: repository-community-edition-eula-rest
    port: 8080
    description: REST adapter for Sonatype Nexus Repository Manager — Community Edition Eula. One Spectral-compliant resource
      per consumed operation, prefixed with /v1.
    resources:
    - path: /v1/v1/system/eula
      name: v1-system-eula
      description: REST surface for v1-system-eula.
      operations:
      - method: GET
        name: getcommunityeulastatus
        description: Get the current Community Eula status.
        call: repository-community-edition-eula.getcommunityeulastatus
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: seteulaacceptedce
        description: Set the Community Eula status.
        call: repository-community-edition-eula.seteulaacceptedce
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: repository-community-edition-eula-mcp
    port: 9090
    transport: http
    description: MCP adapter for Sonatype Nexus Repository Manager — Community Edition Eula. One tool per consumed operation,
      routed inline through this capability's consumes block.
    tools:
    - name: get-current-community-eula-status
      description: Get the current Community Eula status.
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: repository-community-edition-eula.getcommunityeulastatus
      outputParameters:
      - type: object
        mapping: $.
    - name: set-community-eula-status
      description: Set the Community Eula status.
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: repository-community-edition-eula.seteulaacceptedce
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
