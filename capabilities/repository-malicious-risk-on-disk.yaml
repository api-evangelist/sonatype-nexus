naftiko: 1.0.0-alpha2
info:
  label: Sonatype Nexus Repository Manager — Malicious Risk On Disk
  description: 'Sonatype Nexus Repository Manager — Malicious Risk On Disk. 2 operations. Lead operation: Get RHC Enabled
    registries for malicious risk scanning.. Self-contained Naftiko capability covering one Sonatype Nexus business surface.'
  tags:
  - Sonatype Nexus
  - Malicious Risk On Disk
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    SONATYPE_NEXUS_API_KEY: SONATYPE_NEXUS_API_KEY
capability:
  consumes:
  - type: http
    namespace: repository-malicious-risk-on-disk
    baseUri: ''
    description: Sonatype Nexus Repository Manager — Malicious Risk On Disk business capability. Self-contained, no shared
      references.
    resources:
    - name: v1-malicious-risk-enabledRegistries
      path: /v1/malicious-risk/enabledRegistries
      operations:
      - name: getenabledregistries
        method: GET
        description: Get RHC Enabled registries for malicious risk scanning.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: v1-malicious-risk-risk-on-disk
      path: /v1/malicious-risk/risk-on-disk
      operations:
      - name: getmaliciousriskondiskcount
        method: GET
        description: Get Malicious Risk On Disk Count
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: basic
      username: '{{env.SONATYPE_NEXUS_USER}}'
      password: '{{env.SONATYPE_NEXUS_PASS}}'
  exposes:
  - type: rest
    namespace: repository-malicious-risk-on-disk-rest
    port: 8080
    description: REST adapter for Sonatype Nexus Repository Manager — Malicious Risk On Disk. One Spectral-compliant resource
      per consumed operation, prefixed with /v1.
    resources:
    - path: /v1/v1/malicious-risk/enabledregistries
      name: v1-malicious-risk-enabledregistries
      description: REST surface for v1-malicious-risk-enabledRegistries.
      operations:
      - method: GET
        name: getenabledregistries
        description: Get RHC Enabled registries for malicious risk scanning.
        call: repository-malicious-risk-on-disk.getenabledregistries
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/v1/malicious-risk/risk-on-disk
      name: v1-malicious-risk-risk-on-disk
      description: REST surface for v1-malicious-risk-risk-on-disk.
      operations:
      - method: GET
        name: getmaliciousriskondiskcount
        description: Get Malicious Risk On Disk Count
        call: repository-malicious-risk-on-disk.getmaliciousriskondiskcount
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: repository-malicious-risk-on-disk-mcp
    port: 9090
    transport: http
    description: MCP adapter for Sonatype Nexus Repository Manager — Malicious Risk On Disk. One tool per consumed operation,
      routed inline through this capability's consumes block.
    tools:
    - name: get-rhc-enabled-registries-malicious
      description: Get RHC Enabled registries for malicious risk scanning.
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: repository-malicious-risk-on-disk.getenabledregistries
      outputParameters:
      - type: object
        mapping: $.
    - name: get-malicious-risk-disk-count
      description: Get Malicious Risk On Disk Count
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: repository-malicious-risk-on-disk.getmaliciousriskondiskcount
      outputParameters:
      - type: object
        mapping: $.
