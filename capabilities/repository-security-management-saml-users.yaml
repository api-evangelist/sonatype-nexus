        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: userId
          in: path
          type: string
          description: The userid the request should apply to.
          required: true
      - name: getuser
        method: GET
        description: Retrieve a SAML user by userId.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: userId
          in: path
          type: string
          description: The userid the request should apply to.
          required: true
      - name: updateuser1
        method: PUT
