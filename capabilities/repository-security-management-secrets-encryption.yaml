naftiko: 1.0.0-alpha2
info:
  label: 'Sonatype Nexus Repository Manager — Security management: secrets encryption'
  description: 'Sonatype Nexus Repository Manager — Security management: secrets encryption. 1 operations. Lead operation:
    Re-encrypt secrets using the specified key. Self-contained Naftiko capability covering one Sonatype Nexus business surface.'
  tags:
  - Sonatype Nexus
  - 'Security management: secrets encryption'
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    SONATYPE_NEXUS_API_KEY: SONATYPE_NEXUS_API_KEY
capability:
  consumes:
  - type: http
    namespace: repository-security-management-secrets-encryption
    baseUri: ''
    description: 'Sonatype Nexus Repository Manager — Security management: secrets encryption business capability. Self-contained,
      no shared references.'
    resources:
    - name: v1-secrets-encryption-re-encrypt
      path: /v1/secrets/encryption/re-encrypt
      operations:
      - name: reencrypt1
        method: PUT
        description: Re-encrypt secrets using the specified key
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    authentication:
      type: basic
      username: '{{env.SONATYPE_NEXUS_USER}}'
      password: '{{env.SONATYPE_NEXUS_PASS}}'
  exposes:
  - type: rest
    namespace: repository-security-management-secrets-encryption-rest
    port: 8080
    description: 'REST adapter for Sonatype Nexus Repository Manager — Security management: secrets encryption. One Spectral-compliant
      resource per consumed operation, prefixed with /v1.'
    resources:
    - path: /v1/v1/secrets/encryption/re-encrypt
      name: v1-secrets-encryption-re-encrypt
      description: REST surface for v1-secrets-encryption-re-encrypt.
      operations:
      - method: PUT
        name: reencrypt1
        description: Re-encrypt secrets using the specified key
        call: repository-security-management-secrets-encryption.reencrypt1
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: repository-security-management-secrets-encryption-mcp
    port: 9090
    transport: http
    description: 'MCP adapter for Sonatype Nexus Repository Manager — Security management: secrets encryption. One tool per
      consumed operation, routed inline through this capability''s consumes block.'
    tools:
    - name: re-encrypt-secrets-using-specified
      description: Re-encrypt secrets using the specified key
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: repository-security-management-secrets-encryption.reencrypt1
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
