naftiko: 1.0.0-alpha2
info:
  label: 'Sonatype Nexus Repository Manager — Security management: LDAP'
  description: 'Sonatype Nexus Repository Manager — Security management: LDAP. 6 operations. Lead operation: List LDAP servers.
    Self-contained Naftiko capability covering one Sonatype Nexus business surface.'
  tags:
  - Sonatype Nexus
  - 'Security management: LDAP'
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    SONATYPE_NEXUS_API_KEY: SONATYPE_NEXUS_API_KEY
capability:
  consumes:
  - type: http
    namespace: repository-security-management-ldap
    baseUri: ''
    description: 'Sonatype Nexus Repository Manager — Security management: LDAP business capability. Self-contained, no shared
      references.'
    resources:
    - name: v1-security-ldap
      path: /v1/security/ldap
      operations:
      - name: getldapservers
        method: GET
        description: List LDAP servers
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: createldapserver
        method: POST
        description: Create LDAP server
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    - name: v1-security-ldap-change-order
      path: /v1/security/ldap/change-order
      operations:
      - name: changeorder
        method: POST
        description: Change LDAP server order
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    - name: v1-security-ldap-name
      path: /v1/security/ldap/{name}
      operations:
      - name: deleteldapserver
        method: DELETE
        description: Delete LDAP server
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: name
          in: path
          type: string
          description: Name of the LDAP server to delete
          required: true
      - name: getldapserver
        method: GET
        description: Get LDAP server
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: name
          in: path
          type: string
          description: Name of the LDAP server to retrieve
          required: true
      - name: updateldapserver
        method: PUT
        description: Update LDAP server
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: name
          in: path
          type: string
          description: Name of the LDAP server to update
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    authentication:
      type: basic
      username: '{{env.SONATYPE_NEXUS_USER}}'
      password: '{{env.SONATYPE_NEXUS_PASS}}'
  exposes:
  - type: rest
    namespace: repository-security-management-ldap-rest
    port: 8080
    description: 'REST adapter for Sonatype Nexus Repository Manager — Security management: LDAP. One Spectral-compliant resource
      per consumed operation, prefixed with /v1.'
    resources:
    - path: /v1/v1/security/ldap
      name: v1-security-ldap
      description: REST surface for v1-security-ldap.
      operations:
      - method: GET
        name: getldapservers
        description: List LDAP servers
        call: repository-security-management-ldap.getldapservers
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: createldapserver
        description: Create LDAP server
        call: repository-security-management-ldap.createldapserver
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/v1/security/ldap/change-order
      name: v1-security-ldap-change-order
      description: REST surface for v1-security-ldap-change-order.
      operations:
      - method: POST
        name: changeorder
        description: Change LDAP server order
        call: repository-security-management-ldap.changeorder
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/v1/security/ldap/{name}
