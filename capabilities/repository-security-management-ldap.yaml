        destructive: false
        idempotent: false
      call: repository-security-management-ldap.createldapserver
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: change-ldap-server-order
      description: Change LDAP server order
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: repository-security-management-ldap.changeorder
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: delete-ldap-server
      description: Delete LDAP server
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: repository-security-management-ldap.deleteldapserver
      with:
        name: tools.name
      outputParameters:
      - type: object
        mapping: $.
    - name: get-ldap-server
      description: Get LDAP server
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: repository-security-management-ldap.getldapserver
      with:
        name: tools.name
      outputParameters:
      - type: object
        mapping: $.
    - name: update-ldap-server
      description: Update LDAP server
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: repository-security-management-ldap.updateldapserver
      with:
        name: tools.name
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
