      description: REST surface for v1-security-ldap-name.
      operations:
      - method: DELETE
        name: deleteldapserver
        description: Delete LDAP server
        call: repository-security-management-ldap.deleteldapserver
        with:
          name: rest.name
        outputParameters:
        - type: object
          mapping: $.
      - method: GET
        name: getldapserver
        description: Get LDAP server
        call: repository-security-management-ldap.getldapserver
        with:
          name: rest.name
        outputParameters:
        - type: object
          mapping: $.
      - method: PUT
        name: updateldapserver
        description: Update LDAP server
        call: repository-security-management-ldap.updateldapserver
        with:
          name: rest.name
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
