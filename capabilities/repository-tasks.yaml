        outputParameters:
        - type: object
          mapping: $.
      - method: GET
        name: gettaskbyid
        description: Get a single task by id
        call: repository-tasks.gettaskbyid
        with:
          id: rest.id
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/v1/tasks/{id}/run
      name: v1-tasks-id-run
