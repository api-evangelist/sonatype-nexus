naftiko: 1.0.0-alpha2
info:
  label: Sonatype Nexus Repository Manager — Tasks
  description: 'Sonatype Nexus Repository Manager — Tasks. 9 operations. Lead operation: List tasks. Self-contained Naftiko
    capability covering one Sonatype Nexus business surface.'
  tags:
  - Sonatype Nexus
  - Tasks
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    SONATYPE_NEXUS_API_KEY: SONATYPE_NEXUS_API_KEY
capability:
  consumes:
  - type: http
    namespace: repository-tasks
    baseUri: ''
    description: Sonatype Nexus Repository Manager — Tasks business capability. Self-contained, no shared references.
    resources:
    - name: v1-tasks
      path: /v1/tasks
      operations:
      - name: gettasks
        method: GET
        description: List tasks
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: type
          in: query
          type: string
          description: Type of the tasks to get
      - name: createtask
        method: POST
        description: Create task
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    - name: v1-tasks-templates
      path: /v1/tasks/templates
      operations:
      - name: gettasktemplates
        method: GET
        description: List tasks of template tasks. This is the base to create new tasks
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: v1-tasks-templates-typeId
      path: /v1/tasks/templates/{typeId}
      operations:
      - name: gettasktemplate
        method: GET
        description: Get task template by type. This is the base to create new tasks
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: typeId
          in: path
          type: string
          required: true
    - name: v1-tasks-id
      path: /v1/tasks/{id}
      operations:
      - name: deletetaskbyid
        method: DELETE
        description: Delete task by id
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: string
          required: true
      - name: gettaskbyid
        method: GET
        description: Get a single task by id
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: string
          description: Id of the task to get
          required: true
    - name: v1-tasks-id-run
      path: /v1/tasks/{id}/run
      operations:
      - name: run
        method: POST
        description: Run task
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: string
          description: Id of the task to run
          required: true
    - name: v1-tasks-id-stop
      path: /v1/tasks/{id}/stop
      operations:
      - name: stop
        method: POST
        description: Stop task
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: string
          description: Id of the task to stop
          required: true
    - name: v1-tasks-taskId
      path: /v1/tasks/{taskId}
      operations:
      - name: updatetask
        method: PUT
        description: Update an existing task
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: taskId
          in: path
          type: string
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    authentication:
      type: basic
      username: '{{env.SONATYPE_NEXUS_USER}}'
      password: '{{env.SONATYPE_NEXUS_PASS}}'
  exposes:
