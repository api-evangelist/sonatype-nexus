naftiko: 1.0.0-alpha2
info:
  label: Sonatype Nexus Repository Manager — Support
  description: 'Sonatype Nexus Repository Manager — Support. 2 operations. Lead operation: Creates and downloads a support
    zip. Self-contained Naftiko capability covering one Sonatype Nexus business surface.'
  tags:
  - Sonatype Nexus
  - Support
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    SONATYPE_NEXUS_API_KEY: SONATYPE_NEXUS_API_KEY
capability:
  consumes:
  - type: http
    namespace: repository-support
    baseUri: ''
    description: Sonatype Nexus Repository Manager — Support business capability. Self-contained, no shared references.
    resources:
    - name: v1-support-supportzip
      path: /v1/support/supportzip
      operations:
      - name: supportzip
        method: POST
        description: Creates and downloads a support zip
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    - name: v1-support-supportzippath
      path: /v1/support/supportzippath
      operations:
      - name: supportzippath
        method: POST
        description: Creates a support zip and returns the path
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    authentication:
      type: basic
      username: '{{env.SONATYPE_NEXUS_USER}}'
      password: '{{env.SONATYPE_NEXUS_PASS}}'
  exposes:
  - type: rest
    namespace: repository-support-rest
    port: 8080
    description: REST adapter for Sonatype Nexus Repository Manager — Support. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/v1/support/supportzip
      name: v1-support-supportzip
      description: REST surface for v1-support-supportzip.
      operations:
      - method: POST
        name: supportzip
        description: Creates and downloads a support zip
        call: repository-support.supportzip
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/v1/support/supportzippath
      name: v1-support-supportzippath
      description: REST surface for v1-support-supportzippath.
      operations:
      - method: POST
        name: supportzippath
        description: Creates a support zip and returns the path
        call: repository-support.supportzippath
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: repository-support-mcp
    port: 9090
    transport: http
    description: MCP adapter for Sonatype Nexus Repository Manager — Support. One tool per consumed operation, routed inline
      through this capability's consumes block.
    tools:
    - name: creates-and-downloads-support-zip
      description: Creates and downloads a support zip
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: repository-support.supportzip
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: creates-support-zip-and-returns
      description: Creates a support zip and returns the path
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: repository-support.supportzippath
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
